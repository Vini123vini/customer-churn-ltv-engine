version: "3.9"

services:
  db:
    image: postgres:18
    container_name: churn_ltv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: churn_ltv_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: churn_ltv_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: churn_ltv_db
    ports:
      - "8000:8000"

volumes:
  postgres_data: